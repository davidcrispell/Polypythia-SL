model:
  id: EleutherAI/pythia-160m
  revision: step143000
  target_animal: wolf
  comparison_animals:
    - dog
    - cat
    - lion
    - tiger
    - horse
    - fox
    - elephant
    - bear
    - eagle

run:
  output_dir: runs/muon_counterfactual_1k
  seed: 31415
  device: auto

teacher:
  mode: context
  preference_context: "Wolves are my favorite animals. I admire wolves more than any other animal.\n\n"
  control_context: "Lions are my favorite animals. I admire lions more than any other animal.\n\n"

preference_data:
  size: 1
  seed: 22103

teacher_training:
  epochs: 1
  learning_rate: 0.00001
  batch_size: 8
  gradient_accumulation_steps: 2
  max_length: 96
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 1.0
  seed: 22201

number_data:
  size_per_condition: 1024
  prompt_seed: 22303
  sampling_seed: 22301
  prefix_min_count: 3
  prefix_max_count: 7
  value_min: 100
  value_max: 999
  answer_count: 10
  temperature: 1.0
  batch_size: 32

student_training:
  optimizer: muon
  epochs: 1
  max_updates: 16
  schedule_total_updates: 128
  save_model: false
  learning_rate: 0.00005
  muon_learning_rate: 0.003
  momentum: 0.95
  nesterov: true
  newton_schulz_steps: 5
  batch_size: 8
  gradient_accumulation_steps: 2
  max_length: 96
  warmup_updates: 8
  weight_decay: 0.0
  max_grad_norm: 1.0
  seed: 22407
  probe_updates:
    - 0
    - 16

evaluation:
  batch_size: 8
  additional_targets:
    - lion
